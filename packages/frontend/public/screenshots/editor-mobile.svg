  <!-- Hero block -->
  <rect x="72" y="280" width="576" height="280" rx="16" fill="url(#hero)"/>
  <rect x="104" y="316" width="320" height="28" rx="6" fill="#ffffff" opacity="0.9"/>
  <rect x="104" y="356" width="440" height="20" rx="4" fill="#ffffff" opacity="0.7"/>
  <rect x="104" y="384" width="380" height="20" rx="4" fill="#ffffff" opacity="0.7"/>
  <rect x="104" y="476" width="180" height="56" rx="28" fill="#ffffff"/>
  <text x="194" y="512" font-size="22" font-weight="600" fill="#2563EB" text-anchor="middle">Buy now</text>

  <!-- Feature blocks -->
  <rect x="72" y="588" width="270" height="200" rx="12" fill="#F1F5F9"/>
  <circle cx="120" cy="640" r="26" fill="#14B8A6"/>
  <path d="M111 640 L119 648 L131 632" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="92" y="680" width="200" height="14" rx="3" fill="#334155"/>
  <rect x="92" y="704" width="160" height="10" rx="3" fill="#94A3B8"/>
  <rect x="92" y="724" width="180" height="10" rx="3" fill="#94A3B8"/>
  <rect x="92" y="744" width="140" height="10" rx="3" fill="#94A3B8"/>

  <rect x="378" y="588" width="270" height="200" rx="12" fill="#F1F5F9"/>
  <circle cx="426" cy="640" r="26" fill="#2563EB"/>
  <path d="M420 632 L420 648 M414 640 L432 640" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <rect x="398" y="680" width="200" height="14" rx="3" fill="#334155"/>
  <rect x="398" y="704" width="160" height="10" rx="3" fill="#94A3B8"/>
  <rect x="398" y="724" width="180" height="10" rx="3" fill="#94A3B8"/>
  <rect x="398" y="744" width="140" height="10" rx="3" fill="#94A3B8"/>

  <!-- Selected block with handles -->
  <rect x="72" y="820" width="576" height="300" rx="12" fill="#F8FAFC" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 6"/>
  <rect x="100" y="852" width="240" height="22" rx="5" fill="#334155"/>
  <rect x="100" y="888" width="380" height="14" rx="3" fill="#94A3B8"/>
  <rect x="100" y="912" width="340" height="14" rx="3" fill="#94A3B8"/>
  <rect x="100" y="952" width="160" height="120" rx="10" fill="#E2E8F0"/>
  <path d="M140 1012 L180 980 L220 1012 L220 1052 L140 1052 Z" fill="#CBD5E1"/>
  <circle cx="160" cy="990" r="8" fill="#CBD5E1"/>
  <rect x="288" y="952" width="280" height="14" rx="3" fill="#94A3B8"/>
  <rect x="288" y="976" width="240" height="14" rx="3" fill="#94A3B8"/>
  <rect x="288" y="1000" width="260" height="14" rx="3" fill="#94A3B8"/>

  <!-- Selection handles -->
  <rect x="64" y="812" width="16" height="16" rx="3" fill="#2563EB"/>
  <rect x="640" y="812" width="16" height="16" rx="3" fill="#2563EB"/>
  <rect x="64" y="1112" width="16" height="16" rx="3" fill="#2563EB"/>
  <rect x="640" y="1112" width="16" height="16" rx="3" fill="#2563EB"/>

  <!-- Bottom toolbar -->
  <rect x="32" y="1216" width="656" height="120" rx="60" fill="#0F172A"/>
  <circle cx="120" cy="1276" r="28" fill="#14B8A6"/>
  <path d="M108 1276 L120 1264 L132 1276 M120 1264 L120 1288" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="240" cy="1276" r="28" fill="#1E293B"/>
  <path d="M228 1276 L252 1276 M240 1264 L240 1288" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="360" cy="1276" r="28" fill="#1E293B"/>
  <rect x="346" y="1262" width="28" height="28" rx="4" stroke="#ffffff" stroke-width="3" fill="none"/>
  <circle cx="480" cy="1276" r="28" fill="#1E293B"/>
  <path d="M468 1276 L478 1286 L494 1268" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="540" y="1248" width="120" height="56" rx="28" fill="#2563EB"/>
  <text x="600" y="1284" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">Publish</text>

  <!-- Home indicator -->
  <rect x="280" y="1432" width="160" height="8" rx="4" fill="#0F172A" opacity="0.3"/>
