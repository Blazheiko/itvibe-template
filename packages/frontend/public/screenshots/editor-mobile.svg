<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1480" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="720" height="1480" fill="#EDF1F7"/>

  <!-- Top app bar -->
  <rect width="720" height="120" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="22" fill="#ffffff" opacity="0.25"/>
  <rect x="44" y="44" width="32" height="4" rx="2" fill="#ffffff"/>
  <rect x="44" y="58" width="32" height="4" rx="2" fill="#ffffff"/>
  <rect x="44" y="72" width="32" height="4" rx="2" fill="#ffffff"/>
  <text x="110" y="72" font-size="32" font-weight="600" fill="#ffffff">Promo Editor</text>
  <circle cx="640" cy="60" r="22" fill="#ffffff" opacity="0.25"/>
  <path d="M630 60 L640 70 L654 50" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tool tabs -->
  <rect x="32" y="156" width="656" height="64" rx="32" fill="#ffffff"/>
  <rect x="40" y="164" width="156" height="48" rx="24" fill="#2563EB"/>
  <text x="118" y="195" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">Layout</text>
  <text x="270" y="195" font-size="22" fill="#64748B" text-anchor="middle">Text</text>
  <text x="400" y="195" font-size="22" fill="#64748B" text-anchor="middle">Image</text>
  <text x="540" y="195" font-size="22" fill="#64748B" text-anchor="middle">Theme</text>

  <!-- Canvas / page preview -->
