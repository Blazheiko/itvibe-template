<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1290" height="2796" fill="url(#bg)"/>

  <!-- Decorative soft circles -->
  <circle cx="180" cy="320" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="1140" cy="2480" r="280" fill="#ffffff" opacity="0.06"/>
  <circle cx="1180" cy="540" r="120" fill="#ffffff" opacity="0.08"/>

  <!-- Logo tile (white) -->
  <rect x="425" y="1080" width="440" height="440" rx="96" fill="#ffffff"/>

  <!-- Lightning bolt -->
  <g transform="translate(425 1080)">
    <path d="M253 60 L129 249 H202 L176 380 L317 185 H240 Z"
          fill="url(#logoBg)"
          stroke="url(#logoBg)"
          stroke-width="6"
          stroke-linejoin="round"/>
  </g>

  <!-- App name -->
  <text x="645" y="1700" text-anchor="middle"
        font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="104" font-weight="700" fill="#ffffff"
        letter-spacing="-2">ITVibe Template</text>

  <!-- Tagline -->
  <text x="645" y="1780" text-anchor="middle"
        font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="44" font-weight="400" fill="#ffffff" opacity="0.85">
    Build promo pages in minutes
  </text>
</svg>
